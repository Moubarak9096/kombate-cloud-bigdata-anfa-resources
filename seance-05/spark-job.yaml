apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: anfa-heures-pointe
  namespace: spark
spec:
  type: Python
  mode: cluster
  image: spark-job:latest
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/jobs/heures_de_pointe.py
  sparkVersion: 3.5.8
  restartPolicy:
    type: Never
  
  sparkConf:
    # Configuration Ivy pour les dépendances
    "spark.jars.ivy": "/tmp/.ivy2"
    
    # Configuration pour MinIO/S3
    "spark.hadoop.fs.s3a.endpoint": "http://minio:9000"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    "spark.hadoop.fs.s3a.access.key": "minioadmin"
    "spark.hadoop.fs.s3a.secret.key": "minioadmin"
    "spark.hadoop.fs.s3a.connection.ssl.enabled": "false"
    "spark.hadoop.fs.s3a.path.style.access": "true"
    
    # Configuration pour Spark
    "spark.kubernetes.container.image.pullPolicy": "IfNotPresent"
    "spark.kubernetes.driver.secrets.minio-credentials": "/mnt/secrets"
    "spark.kubernetes.executor.secrets.minio-credentials": "/mnt/secrets"
  
  deps:
    packages:
      - "org.apache.hadoop:hadoop-aws:3.3.4"
      - "com.amazonaws:aws-java-sdk-bundle:1.12.262"
  
  driver:
    cores: 1
    memory: 1024m
    labels:
      version: 3.5.8
    env:
      - name: HOME
        value: /tmp
      - name: PYTHONPATH
        value: /usr/local/lib/python3.10/dist-packages
  
  executor:
    cores: 1
    memory: 1024m
    instances: 2
    labels:
      version: 3.5.8
    env:
      - name: HOME
        value: /tmp
      - name: PYTHONPATH
        value: /usr/local/lib/python3.10/dist-packages